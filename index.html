<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futbol Stats Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-green-50 to-blue-50">
    <!-- Navegación -->
    <nav class="bg-gradient-to-r from-green-600 to-green-700 text-white shadow-lg">
        <div class="container mx-auto px-4 sm:px-6 py-3">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <h1 class="text-xl sm:text-2xl font-bold flex items-center">
                        <i class="fas fa-futbol mr-2 text-yellow-300"></i>
                        <span class="hidden xs:inline">Futbol Stats Pro</span>
                        <span class="xs:hidden">FSP</span>
                    </h1>
                </div>

                <!-- Botón de menú móvil -->
                <div class="md:hidden">
                    <button id="menu-toggle" class="focus:outline-none">
                        <i class="fas fa-bars text-2xl"></i>
                    </button>
                </div>

                <!-- Navegación desktop -->
                <div class="hidden md:flex items-center space-x-2 lg:space-x-4">
                    <a href="/" class="hover:bg-green-500 hover:bg-opacity-30 px-3 py-2 rounded-lg transition flex items-center">
                        <i class="fas fa-home mr-1"></i>Inicio
                    </a>
                    <a href="equipos.html" class="hover:bg-green-500 hover:bg-opacity-30 px-3 py-2 rounded-lg transition flex items-center">
                        <i class="fas fa-shield-alt mr-1"></i>Equipos
                    </a>
                    <a href="jugadores.html" class="hover:bg-green-500 hover:bg-opacity-30 px-3 py-2 rounded-lg transition flex items-center">
                        <i class="fas fa-users mr-1"></i>Jugadores
                    </a>
                    <a href="partidos.html" class="hover:bg-green-500 hover:bg-opacity-30 px-3 py-2 rounded-lg transition flex items-center">
                        <i class="fas fa-calendar-alt mr-1"></i>Partidos
                    </a>
                    <a href="estadisticas.html" class="hover:bg-green-500 hover:bg-opacity-30 px-3 py-2 rounded-lg transition flex items-center">
                        <i class="fas fa-chart-bar mr-1"></i>Estadísticas
                    </a>
                </div>

                <!-- Botones exportar/importar -->
                <div class="hidden md:flex items-center space-x-2">
                    <button onclick="exportarDatos()" class="bg-blue-500 hover:bg-blue-600 px-3 py-2 rounded-lg text-sm font-semibold transition flex items-center">
                        <i class="fas fa-download mr-1"></i>Exportar
                    </button>
                    <button onclick="document.getElementById('importFile').click()" class="bg-purple-500 hover:bg-purple-600 px-3 py-2 rounded-lg text-sm font-semibold transition flex items-center">
                        <i class="fas fa-upload mr-1"></i>Importar
                    </button>
                    <input type="file" id="importFile" class="hidden" accept=".json" onchange="importarDatos(this)">
                </div>
            </div>

            <!-- Menú móvil -->
            <div id="mobile-menu" class="hidden md:hidden mt-4 pb-2 space-y-2">
                <a href="/" class="block hover:bg-green-500 hover:bg-opacity-30 px-4 py-2 rounded-lg transition">
                    <i class="fas fa-home mr-2"></i>Inicio
                </a>
                <a href="equipos.html" class="block hover:bg-green-500 hover:bg-opacity-30 px-4 py-2 rounded-lg transition">
                    <i class="fas fa-shield-alt mr-2"></i>Equipos
                </a>
                <a href="jugadores.html" class="block hover:bg-green-500 hover:bg-opacity-30 px-4 py-2 rounded-lg transition">
                    <i class="fas fa-users mr-2"></i>Jugadores
                </a>
                <a href="partidos.html" class="block hover:bg-green-500 hover:bg-opacity-30 px-4 py-2 rounded-lg transition">
                    <i class="fas fa-calendar-alt mr-2"></i>Partidos
                </a>
                <a href="estadisticas.html" class="block hover:bg-green-500 hover:bg-opacity-30 px-4 py-2 rounded-lg transition">
                    <i class="fas fa-chart-bar mr-2"></i>Estadísticas
                </a>
                <div class="flex space-x-2 pt-2">
                    <button onclick="exportarDatos()" class="flex-1 bg-blue-500 hover:bg-blue-600 px-3 py-2 rounded-lg text-sm font-semibold transition">
                        <i class="fas fa-download mr-1"></i>Exportar
                    </button>
                    <button onclick="document.getElementById('importFileMobile').click()" class="flex-1 bg-purple-500 hover:bg-purple-600 px-3 py-2 rounded-lg text-sm font-semibold transition">
                        <i class="fas fa-upload mr-1"></i>Importar
                    </button>
                    <input type="file" id="importFileMobile" class="hidden" accept=".json" onchange="importarDatos(this)">
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-3 sm:px-4 md:px-6 py-4 sm:py-6 md:py-8">
        <h2 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-6">Panel Principal</h2>
        
        <!-- Stats cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8" id="stats-cards">
            <!-- Se llenarán con JavaScript -->
        </div>

        <!-- Últimos partidos y equipos -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white rounded-xl shadow-lg p-4 sm:p-6">
                <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                    <i class="fas fa-history text-green-600 mr-2"></i>
                    Últimos Partidos
                </h3>
                <div id="ultimos-partidos" class="space-y-3">
                    <!-- Se llenarán con JavaScript -->
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-lg p-4 sm:p-6">
                <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-center">
                    <i class="fas fa-shield-alt text-green-600 mr-2"></i>
                    Equipos Registrados
                </h3>
                <div id="equipos-lista" class="space-y-3">
                    <!-- Se llenarán con JavaScript -->
                </div>
                <a href="equipos.html" class="mt-4 block text-center text-green-600 hover:text-green-700 font-medium">
                    Ver todos los equipos <i class="fas fa-arrow-right ml-1"></i>
                </a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
