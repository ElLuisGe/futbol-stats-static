<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equipos - Futbol Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-green-50 to-blue-50">
    <!-- Misma navegación que en index.html -->
    
    <div class="container mx-auto px-3 sm:px-4 md:px-6 py-4 sm:py-6 md:py-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl sm:text-3xl font-bold text-gray-800">Gestión de Equipos</h2>
            <button onclick="abrirModal()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg font-semibold transition flex items-center">
                <i class="fas fa-plus mr-2"></i>Nuevo Equipo
            </button>
        </div>

        <div id="equipos-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Se llena con JavaScript -->
        </div>
    </div>

    <!-- Modal para nuevo equipo -->
    <div id="modalEquipo" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl p-6 max-w-md w-full">
            <h3 class="text-2xl font-bold mb-6">Agregar Nuevo Equipo</h3>
            <form id="formEquipo">
                <div class="space-y-4">
                    <div>
                        <label class="block text-gray-700 mb-2">Nombre del equipo *</label>
                        <input type="text" id="nombre" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-green-500">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Color representativo</label>
                        <input type="color" id="color" value="#10b981" class="w-full h-10 px-1 py-1 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-gray-700 mb-2">Estadio</label>
                        <input type="text" id="estadio" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:border-green-500">
                    </div>
                </div>
                <div class="flex justify-end space-x-3 mt-6">
                    <button type="button" onclick="cerrarModal()" class="px-6 py-2 border rounded-lg hover:bg-gray-100">Cancelar</button>
                    <button type="submit" class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/equipos.js"></script>
</body>
</html>
